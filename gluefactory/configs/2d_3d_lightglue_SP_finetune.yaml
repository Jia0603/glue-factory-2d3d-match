experiment:
  name: lightglu3d
  seed: 0

model:
  name: lightglue
  weights: "/home/x_jiagu/glue-factory/superpoint_lightglue.pth"
  input_dim: 256
  descriptor_dim: 256
  n_layers: 9
  num_heads: 4
  flash: True
  checkpointed: True
  freeze_backbone: True
  mp: True
  loss:
    gamma: 1.0
    fn: nll
    nll_balancing: 0.5

data:
  name: mega_2d3d_dataset
  root: "/proj/vlarsson/outputs"
  split_train: "splits/train.txt"
  split_val: "splits/val.txt"
  split_test: "splits/test.txt"
  batch_size: 16
  num_workers: 4

train:
  seed: 0
  epochs: 5
  optimizer: adamw
  lr: 1e-3 # 1e-4 for 3-10 epochs
  weight_decay: 1e-4
  scheduler:
    type: multi_step
    milestones: [3, 5, 8] # [5, 8] as usual
    gamma: 0.1

  log_every_iter: 50    
  eval_every_iter: 200
  save_every_iter: 400

val:
  interval: 1
  recall_metrics: [1, 3, 5]
