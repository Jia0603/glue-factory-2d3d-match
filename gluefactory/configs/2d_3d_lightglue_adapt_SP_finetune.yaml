experiment:
  name: lightglu3d
  seed: 0

model:
  name: lightglue_adapt
  weights:  "/home/x_jiagu/glue-factory/superpoint_lightglue.pth"
  flash: True
  checkpointed: True
  freeze_backbone: True
  mp: True
  filter_threshold: 0.1
  loss:
    gamma: 1.0
    fn: nll
    nll_balancing: 0.5

data:
  name: mega_2d3d_dataset_soft # mega_2d3d_dataset
  root: "/proj/vlarsson/outputs"
  split_train: "splits/train_small.txt"
  split_val: "splits/val.txt"
  split_test: "splits/test.txt"
  batch_size: 32
  num_workers: 16

train:
  seed: 0
  epochs: 40
  optimizer: adamw
  lr: 1e-5 
  lr_schedule:
    type: "exp" 
    start: 30
    on_epoch: True
    exp_div_10: 45 # gamma = 0.95
  log_every_iter: 50    
  eval_every_iter: 200
  save_every_iter: 400

val:
  interval: 1
  recall_metrics: [1, 3, 5]
