experiment:
  name: lightglu3d
  seed: 0

model:
  name: lightglu3d
  weights: "/home/x_jiagu/glue-factory/superpoint_lightglue.pth"
  input_dim: 256
  descriptor_dim: 256
  n_layers: 9
  num_heads: 4
  flash: True
  checkpointed: True
  mp: True
  filter_threshold: 0.1
  loss:
    gamma: 1.0
    fn: nll
    nll_balancing: 0.5

data:
  name: mega_2d3d_dataset
  root: "/proj/vlarsson/outputs"
  split_train: "splits/train_72.txt"
  split_val: "splits/val_72.txt"
  split_test: "splits/test_72.txt"
  batch_size: 32
  num_workers: 16

train:
  seed: 0
  epochs: 10
  optimizer: adamw
  lr: 1e-3 # 1e-4 for 3-10 epochs
  lr_schedule:
    type: "MultiStepLR" 
    on_epoch: True     
    options:
      milestones: [9, 12, 18]
      gamma: 0.5
  freeze_2d: False
  initial_3d_with_2d: True
  log_every_iter: 50    
  eval_every_iter: 200
  save_every_iter: 400

val:
  interval: 1
  recall_metrics: [1, 3, 5]
